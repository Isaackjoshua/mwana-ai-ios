name: mwana_ai
description: AI-assisted breast cancer screening from ultrasound images
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2
  flutter_onnxruntime: ^1.0.0
  image: ^4.1.7
  flutter_gemma: ^0.16.1
  file_picker: ^8.1.2
  pdf: ^3.11.0
  printing: ^5.13.1
  share_plus: ^10.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/icons/

flutter_launcher_icons:
  ios: true
  android: false
  remove_alpha_ios: true
  image_path: "assets/icons/app_icon.png"

dependency_overrides:
  flutter_onnxruntime:
    path: packages/flutter_onnxruntime
  flutter_gemma:
    path: packages/flutter_gemma
  local_hnsw:
    path: packages/local_hnsw
  dart_sentencepiece_tokenizer:
    path: packages/dart_sentencepiece_tokenizer
